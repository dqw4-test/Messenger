services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: socialnetwork
      POSTGRES_USER: socialuser
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialuser -d socialnetwork"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/socialnetwork
      DB_USERNAME: socialuser
      DB_PASSWORD: change_me
      JPA_DDL_AUTO: update
      JWT_ISSUER: social-network
      JWT_ACCESS_SECRET: change-me-change-me-change-me-change-me
      JWT_REFRESH_SECRET: change-me-refresh-change-me-refresh
      JWT_ACCESS_TTL_MINUTES: 15
      JWT_REFRESH_TTL_DAYS: 7
      APP_UPLOAD_DIR: /app/uploads
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:4173,http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres-data:
  uploads-data:
