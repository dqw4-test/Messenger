name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_BACKEND" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_BACKEND"
          else
            echo "RENDER_DEPLOY_HOOK_BACKEND is not set, skipping"
          fi

      - name: Trigger frontend deploy
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_FRONTEND" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_FRONTEND"
          else
            echo "RENDER_DEPLOY_HOOK_FRONTEND is not set, skipping"
          fi

  Healthcheck:
    needs: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for rollout
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -n "$RENDER_HEALTHCHECK_URL" ]; then
            sleep 45
          else
            echo "RENDER_HEALTHCHECK_URL is not set, skipping wait"
          fi

      - name: Healthcheck
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -n "$RENDER_HEALTHCHECK_URL" ]; then
            curl -fsS "$RENDER_HEALTHCHECK_URL"
          else
            echo "RENDER_HEALTHCHECK_URL is not set, skipping healthcheck"
          fi
