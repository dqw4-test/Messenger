services:
  - type: web
    name: social-network-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: JAVA_TOOL_OPTIONS
        value: -XX:InitialRAMPercentage=25 -XX:MaxRAMPercentage=75 -XX:+UseSerialGC -XX:+ExitOnOutOfMemoryError
      - key: DB_HOST
        fromDatabase:
          name: social-network-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: social-network-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: social-network-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: social-network-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: social-network-db
          property: password
      - key: JPA_DDL_AUTO
        value: update
      - key: JWT_ISSUER
        value: social-network
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_MINUTES
        value: 15
      - key: JWT_REFRESH_TTL_DAYS
        value: 7
      - key: APP_UPLOAD_DIR
        value: /app/uploads
      - key: CORS_ALLOWED_ORIGINS
        value: https://social-network-ui.onrender.com

  - type: web
    name: social-network-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://social-network-api-cywz.onrender.com

databases:
  - name: social-network-db
    plan: free
    databaseName: socialnetwork
    user: socialuser
