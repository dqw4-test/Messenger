spring:
  application:
    name: SocialNetwork
  config:
    import: optional:file:.env[.properties],optional:file:./config/application-secrets.properties
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:socialnetwork}}
    username: ${DB_USERNAME:socialuser}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        generate_statistics: false
server:
  port: ${PORT:${SERVER_PORT:8080}}
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    issuer: ${JWT_ISSUER:social-network}
    access-secret: ${JWT_ACCESS_SECRET:change-me-change-me-change-me-change-me}
    refresh-secret: ${JWT_REFRESH_SECRET:change-me-refresh-change-me-refresh}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}
  storage:
    upload-dir: ${APP_UPLOAD_DIR:uploads}
  web:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
